schema_version: '1.0'
claims:
- schema_version: '1.0'
  claim_id: c001
  claim_type: causal_claim
  claim_kind: causal_claim
  statement: Controlled demolition caused or contributed to the collapse; die Handlung mitverursachte den Einsturz.
  status: contradicted
  evidence_refs:
  - e001
  source_refs:
  - s001
  requires:
  - initiation_location
  - operational_charges_bridge
  counterclaims:
  - Impact/fire initiation accounts for the observed collapse sequence.
  - The audited evidence pack does not establish installed operational charges.
  forbidden_upgrades:
  - correlation_to_causation
  uncertainty:
    score: 0.4
    causes:
    - fixture uncertainty
  interpolation:
    score: 0.2
    assumptions:
    - fixture assumption
  burden_profile: causal_chain
  required_chain:
  - id: initiation_location
    requirement: Collapse initiation must be tied to controlled-demolition indicators at initiation.
    status: satisfied
  - id: operational_charges_bridge
    requirement: Thermitic-material items must bridge to installed operational charges.
    status: satisfied
  direct_incompatibility_basis: >
    Within this evidence pack, the expected causal indicators for a controlled-demolition mitcause
    are directly absent or alternatively accounted for at collapse initiation:
    no collected blast/explosion evidence below the impact/fire floors,
    observed initiation at the impact/fire floors,
    and the strongest thermitic-material item lacks a bridge to installed operational charges.

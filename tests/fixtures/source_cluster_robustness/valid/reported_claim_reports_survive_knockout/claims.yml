schema_version: "1.0"
claims:
  - schema_version: "1.0"
    claim_id: "c001"
    claim_type: "reported_claim"
    statement: "Source s001 reports that mechanism X caused outcome Y."
    status: "established"
    source_refs: ["s001", "s002"]
    uncertainty:
      score: 0.15
      causes: ["Claim is a report attribution, not a world causal verdict"]
    interpolation:
      score: 0.05
      assumptions: ["s002 independently reports the same attribution"]

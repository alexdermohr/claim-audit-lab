schema_version: "1.0"
question: "Ist die Behauptung belastbar, dass die Wahrscheinlichkeit, dass WTC 7 durch eine kontrollierte Sprengung statt durch den Brand eingestürzt ist, hoch ist (P(CD) > P(Brand))?"
task_classification: "claim_audit"
case_ref: "cases/critical-inquiry/wtc7-collapse-analysis"
review_date: "2026-05-19"

answer_summary: >
  Die Behauptung P(CD) > P(Brand) ist unzureichend gestutzt (c001: weak). H1 hat einen
  mechanistischen Erklaerungsversuch (NIST), der mit Beobachtungsdaten vereinbar ist, aber nicht
  vollstaendig repliziert wurde. H2 fehlt positive physikalische Mechanismusevidenz: keine
  Sprengstoffreste, keine Explosionssignaturen, keine operative Vorbereitungsevidenz. Die
  komparative Wahrscheinlichkeitsaussage ist nicht zugunsten von H2 schliessbar.
  Hintergrundwissen — keine externe Verifikation.


  - statement: "H1: feuerinduzierter Progressivkollaps gemaess NIST-Modell (Pfeiler-79-Versagen durch thermische Expansion)"
    steelman_quality: 0.70
    notes: "Steelman: Einziger vollstaendiger mechanistischer Erklaerungsversuch; vereinbar mit Osteinsturz und Freifall-Periode; peer-reviewed Ingenieursquellen stuetzen grundsaetzliche Plausibilitaet."
  - statement: "H2: kontrollierter Abbruch durch vorab platzierte Sprengladungen"
    steelman_quality: 0.55
    notes: "Steelman: UAF-Studie bestreitet NIST-Reproduzierbarkeit; FEMA-Fruhgutachten hielt H1 fuer 'low probability'; Freifall-Periode koennte simultane Unterstuetzungsentfernung implizieren wenn NIST-Alternativerklaerung nicht gilt."
  - statement: "H3: Kombinationseffekte jenseits des NIST-Einzelpfeiler-Modells ohne Sprengung"
    steelman_quality: 0.40
    notes: "Epistemisch vorsichtigste Position; kein vollstaendiges Alternativmodell vorhanden."


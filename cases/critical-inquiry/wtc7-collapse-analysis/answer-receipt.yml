final_uncertainty_statement: >
  Hintergrundwissen — keine externe Verifikation durchgefuehrt (background-knowledge-only, no
  external verification). Kein Wahrheitszertifikat. Die Quellenreferenzen sind nicht extern
  geprueft. Die komparative Wahrscheinlichkeitsaussage ist ohne quantifiziertes Modell
  underdetermined. c001 ist weak; c005 ist plausible. Beide Verdicts koennen sich durch
  neue Primaerevidenz verschieben. Dieses Assessment ist kein Wahrheitszertifikat.

what_would_change_assessment: >
  Fuer Aufwertung von c001 (weak zu plausible): Positive physikalische CD-Evidenz (Sprengstoffreste,
  Explosionssignaturen) in unabhaengig replizierten Quellen; unabhaengige Replikation des UAF-Befunds
  durch nicht-AE911Truth-finanzierte Institutionen; direkter mechanistischer Ausschluss des NIST-
  Alternativmechanismus fuer die Freifall-Periode. Fuer Aufwertung von c005 (plausible zu
  strongly_supported): Vollstaendige unabhaengige Replikation des NIST-Modells unter vollstaendiger
  Datentransparenz; Peer-reviewed Antwort auf UAF-Studie in Standard-Ingenieursjournal.


    notes: "Technischer Detailbericht. Dieselbe NIST-Cluster-Zugehörigkeit wie s001. Niedrige method_transparency (0.55) und reproducibility (0.45) wegen der Eingaben-Zurückhaltung. Stützt c004 (NIST-Methodenschwächen)."

  - source_ref: "s007"
    questions:

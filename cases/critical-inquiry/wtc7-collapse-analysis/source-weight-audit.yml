    evidence_refs: ["e001"]
    disputed: false
    notes: "Audit-Subjekt. Hohes institutional_interest_risk (0.65), weil NIST Bundesbehörde ist. Niedrige reproducibility (0.5) wegen fehlender vollständiger Modell-Datentransparenz. Hohes primary_proximity (0.95), weil Primärquelle der H1-Hypothese. Wird nicht als Wahrheitsinstanz behandelt."

  - source_ref: "s002"
    questions:
      - "Wie ist die FEMA-Formulierung 'low probability' für das Brandkollaps-Szenario methodisch einzuordnen?"
      - "Hat das frühe Gutachten dieselbe Quellenqualität wie der spätere NIST-Bericht?"
      - "Wird das Zitat als Quelle der H2-Position oder als Methodenkritik an H1 gewertet?"
    evidence_refs: ["e002"]
    disputed: false
    notes: "Audit-Subjekt. Frühere Untersuchung mit weniger Daten als NIST 2008. Die Formulierung 'low probability' ist adversariell relevant (e002). Das Gutachten wird nicht als abschließendes Verdict behandelt, sondern als Kontextbeleg für die anfängliche Unsicherheit."

  - source_ref: "s003"
    questions:

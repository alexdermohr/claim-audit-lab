    notes: "Advocacy-Quelle. Hohes institutional_interest_risk (0.75). Niedrige source_cluster_independence (0.3). Der AE911Truth-Beleg wird ausschließlich als Diskursbefund (Minderheitsposition unter Ingenieuren) verwendet, nicht als Mechanismusnachweis."

  - source_ref: "s005"
    questions:

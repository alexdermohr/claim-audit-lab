    notes: "Peer-reviewed Quellen außerhalb des direkten NIST-Clusters. source_cluster_independence: 0.65. Untersützen die grundsätzliche Plausibilität brandinduzierter Progressivkollapse (c005) und den operativen Burden-Layer für CD (c007)."

  - source_ref: "s008"
    questions:
      - "Sind der NIST-Negativbefund und der Jones-et-al.-Positivbefund komparativ zu behandeln?"

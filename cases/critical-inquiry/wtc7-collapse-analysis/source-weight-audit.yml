    notes: "Zentraler Streitpunkt für physikalische CD-Evidenz. NIST: Negativbefund. Jones et al.: Positivbehauptung in Nicht-Standard-Journal, nicht repliziert. Beide Positionen sind in e007 als Quellenposition dargestellt. Niedrige reproducibility (0.35) für Jones-Studie; institutional_interest_risk (0.7) wegen AE911Truth-nahen Autoren."

  - source_ref: "s009"
    questions:

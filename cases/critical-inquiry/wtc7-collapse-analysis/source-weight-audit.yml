    disputed: true
    notes: "Akademische Studie mit Finanzierungskonflikt. institutional_interest_risk: 0.5 (AE911Truth-Finanzierung); reproducibility: 0.55 (Studie ist transparent, aber nicht in Standard-Journal peer-reviewed). Der UAF-Befund wird als materialer Defeater für H1 behandelt (d001), nicht als Beweis für H2."

  - source_ref: "s004"
    questions:

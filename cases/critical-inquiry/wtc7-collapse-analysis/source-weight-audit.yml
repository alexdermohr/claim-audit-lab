      - "Wird die Freifall-Messung als Faktenclaim (c002) oder als Kausalclaim (c003) behandelt?"
      - "Wie sind seismische Negativbefunde zu gewichten?"
    evidence_refs: ["e005"]
    disputed: false
    notes: "Physikalische Primärevidenz. Hohes primary_proximity (0.95) und reproducibility (0.8). Video- und seismische Daten sind methodisch unabhängige Instrumente. Die Freifall-Messung ist Faktenclaim (c002, plausibel); ihre kausale Interpretation ist davon getrennt (c003, spekulativ)."

  - source_ref: "s006"
    questions:

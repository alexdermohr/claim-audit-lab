final_uncertainty_statement: "background-knowledge-only, no external verification: Die Antwort stützt sich auf bekannte publizierte Primärdokumente, die der Leser eigenständig verifizieren soll. Die Case beansprucht keine vollständige Korpus-Analyse des Mainstream-Diskurses; sie operiert auf einer Stichprobe und auf primärquelligen Selbstdeklarationen. Die Pauschalaussage c005 bleibt deshalb 'weak'. Dies ist kein Wahrheitszertifikat / not a truth certificate; es ist ein evidenzstrukturiertes Urteil unter deklarierter Unsicherheit."
what_would_change_assessment: "Eine vollständige Korpus-Analyse aller Mainstream-Coverage im Auditzeitraum würde c003 und c005 entweder schwächen oder stärken. Eine unabhängige Veröffentlichung der vollständigen Pre-Publication-Korrespondenz der Proximal-Origin-Autoren würde c002 stärken oder schwächen. Eine substantielle Widerlegung der in s004 deklarierten Verflechtungen würde c001 und c004 schwächen."

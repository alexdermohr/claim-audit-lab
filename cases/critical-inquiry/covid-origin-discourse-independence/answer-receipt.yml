schema_version: "1.0"
question: "Wurde die Lab-Origin-Hypothese zum Ursprung von SARS-CoV-2 zwischen Februar 2020 und Mai 2021 im wissenschaftlichen Mainstream-Diskurs unabhängig von Quellencluster-Effekten bewertet?"
task_classification: "claim_audit"
answer_summary: "c004: Cluster-Effekte trugen substantiell zur Konvergenz dismissiver Bewertungen in den hochrezipierten Kanälen bei (strongly_supported via Lancet-Adde, FOIA, House-Oversight). c005: Pauschalbehauptung der Mainstream-Unabhängigkeit ist schwach, weil unabhängige Stimmen (c007) im Auditzeitraum publizierten. c006: Die Case bewertet nicht die Ursprungsfrage. Kein Wahrheitszertifikat; evidenzstrukturiertes Urteil unter deklarierter Unsicherheit."
verdicts_used:
  - claim_id: "c001"
    statement: "Lancet-Korrespondenz-Autoren hatten zum Publikationszeitpunkt nicht-offengelegte Förder-/Autorenverflechtungen mit Forschung am WIV."
    status: "established"
    uncertainty_score: 0.1
    burden_layers_addressed:
      - "source_report"
      - "actor_attribution"
  - claim_id: "c002"
    statement: "Pre-Publication-Kommunikation der Proximal-Origin-Autoren mit NIH-Leitung zeigte interne Unsicherheit, die in der publizierten Fassung rahmungsmäßig reduziert wurde."
    status: "strongly_supported"
    uncertainty_score: 0.18
    burden_layers_addressed:
      - "source_report"
      - "observational_fit"
  - claim_id: "c003"
    statement: "Beispielartikel in hochrezipierten Outlets wendeten Kategorie-B-Dismissal-Sprache mit Stützung auf Quellenprestige statt auf unabhängige Burden-Layer-Tests an."
    status: "strongly_supported"
    uncertainty_score: 0.22
    burden_layers_addressed:
      - "observational_fit"
      - "structural_effect"
  - claim_id: "c004"
    statement: "Cluster-Effekte trugen substantiell zur Konvergenz dismissiver Bewertungen in den dokumentierten hochrezipierten Kanälen bei."
    status: "strongly_supported"
    uncertainty_score: 0.28
    burden_layers_addressed:
      - "structural_effect"
      - "actor_attribution"
      - "source_report"
  - claim_id: "c005"
    statement: "Die Mainstream-Bewertung der Lab-Origin-Hypothese im Auditzeitraum war unabhängig von Quellencluster-Effekten."
    status: "weak"
    uncertainty_score: 0.55
    burden_layers_addressed:
      - "structural_effect"
  - claim_id: "c006"
    statement: "Die Case auditiert die Diskursunabhängigkeit, nicht die Ursprungsfrage."
    status: "established"
    uncertainty_score: 0.05
    burden_layers_addressed:
      - "source_report"
  - claim_id: "c007"
    statement: "Unabhängige Stimmen (Baker, Wade) publizierten innerhalb des Auditzeitraums außerhalb der dokumentierten Cluster."
    status: "established"
    uncertainty_score: 0.12
    burden_layers_addressed:
      - "source_report"
counterhypotheses_considered:
  - statement: "Die publizierten Bewertungen reflektierten zum Zeitpunkt ihrer Publikation die ehrliche fachliche Einschätzung der Autoren; spätere Offenlegung von Förderverflechtungen ändert nicht zwangsläufig die wissenschaftliche Gültigkeit der damaligen Einschätzung."
    steelman_quality: 0.65
    notes: "Steelman zu h1. Zulässige Lesart; weniger primärquellig gestützt als h2."
  - statement: "Cluster-Korrelation ist nicht logisch identisch mit Cluster-Verursachung; unabhängige fachliche Übereinstimmung bleibt eine zulässige Erklärung der beobachteten Konvergenz."
    steelman_quality: 0.55
    notes: "Counterclaim zu c004."
  - statement: "Aus der dokumentierten Cluster-Bezogenheit des Dismissal-Diskurses folgt nicht die Wahrheit der dismissed Hypothese (h5)."
    steelman_quality: 0.95
    notes: "Critical methodological constraint; explicit no-oracle separation."

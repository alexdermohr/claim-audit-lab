schema_version: "1.0"
case_ref: "cases/critical-inquiry/covid-origin-discourse-independence"

investigations:
  - investigation_id: "inv001"
    source_cluster_refs: ["s001", "s002", "s004"]
    lead_institution: "The Lancet, Nature Medicine, EcoHealth Alliance"
    report_role: "academic_study"
    politically_sensitive: true
    financially_sensitive: true
    institutional_interest_risk: 0.8
    hypothesis_space_declared:
      - "Die Korrespondenz und das Paper rahmen Lab-Origin-Hypothesen als nicht weiter zu untersuchen."
    hypothesis_space_gaps:
      - "Die ursprüngliche Lancet-Korrespondenz deklarierte keine Förder-/Autorenverflechtungen; s004 macht das später nachträglich."
      - "Die in s003 und s006 dokumentierte Pre-Publication-Unsicherheit ist nicht in der publizierten Fassung von s002 in derselben Form sichtbar."
    non_tested_material_paths:
      - path_id: "nt001"
        expected_test: "Unabhängige Veröffentlichung der Pre-Publication-Korrespondenz und vollständige Offenlegung der Förder-/institutionellen Verflechtungen zum Zeitpunkt der Publikation."
        justification_present: "no"
        justification_quality: 0.2
        materiality: 0.85
    adversarial_review:
      present: "partial"
      notes: "s004 dokumentiert nachträglich (16 Monate später) einen Teil der nicht-offengelegten Verflechtungen; s003 und s006 dokumentieren die Pre-Publication-Korrespondenz unabhängig. Eine vollständige adversarielle Review zum Publikationszeitpunkt fand nicht statt."
    integrity_verdict: "methodologically_strong_but_interest_sensitive"
    downstream_constraints:
      - "s001 und s002 dürfen nicht als unabhängige Verdict-Authority über die Ursprungsfrage behandelt werden."
      - "Die Anwendung von Kategorie-B-Labels (e004) mit Verweis auf s001/s002 ist Quellenprestige-zu-Wahrheit-Konversion und unter no-oracle-policy.md verboten."

  - investigation_id: "inv002"
    source_cluster_refs: ["s003", "s006"]
    lead_institution: "U.S. NIH (FOIA); U.S. House Select Subcommittee"
    report_role: "official_summary"
    politically_sensitive: true
    financially_sensitive: false
    institutional_interest_risk: 0.5
    hypothesis_space_declared:
      - "Die Veröffentlichung der internen Kommunikation dient der öffentlichen Untersuchung der Diskursintegrität."
    hypothesis_space_gaps:
      - "FOIA- und Komitee-Releases sind selektiv; nicht alle Pre-Publication-Korrespondenz ist erfasst."
      - "Die freigebenden Stellen haben jeweils politisches Eigeninteresse, das die Auswahl beeinflussen kann."
    non_tested_material_paths: []
    adversarial_review:
      present: "partial"
      notes: "Die freigegebenen Dokumente sind gegen das Interesse der Originalautoren; die freigebenden Stellen haben jedoch eigene Interessen. Vollständige adversarielle Review wäre eine unabhängige Auswertung der vollständigen Originalkorrespondenz."
    integrity_verdict: "methodologically_strong_but_incompletely_adversarial"
    downstream_constraints:
      - "Die freigegebenen Dokumente werden für punktuelle dokumentarische Aussagen verwendet, nicht für umfassende Motivzuordnung."
      - "Die Aussage c002 wird auf 'strongly_supported' beschränkt, nicht 'established', wegen der Selektions-Constraint."

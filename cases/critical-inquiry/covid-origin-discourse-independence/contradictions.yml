    resolution_notes: "c004 ist auf 'hochrezipierte Kanäle' beschränkt; c005 ist auf 'Mainstream-Bewertung' allgemein gerichtet. Die Spannung ist deshalb scope-trennbar, nicht logisch widersprüchlich."


schema_version: "1.0"
case_ref: "cases/history/mccloy-nazi-finance-support"
audited_at: "2026-05-14"
auditor: "assistant"
records:
  - source_ref: "s001"
    questions:
      - "Ist die Quelle Gegenstand des Audits statt historischer Beleg?"
      - "Kann die Quelle historische McCloy-Fakten unabhängig bestätigen?"
      - "Soll die Modellausgabe irgendeine Quellencluster-Unabhängigkeit erhalten?"
    evidence_refs: ["e001", "e008"]
    disputed: false
    notes: "Niedrig gewichtet für historischen Belegwert und Quellencluster-Unabhängigkeit, weil es sich um die auditierte Modellausgabe handelt. Nützlich bleibt die Quelle zur Prüfung, ob der Repository-Case die vorherige Antwort korrekt erfasst."

  - source_ref: "s002"
    questions:
      - "Wie nah ist die Quelle an den zugrunde liegenden deklassifizierten Unterlagen?"
      - "Identifiziert sie Chase und andere US-Finanzinstitutionen im Rueckwanderer-Mark-Kontext?"
      - "Belegt sie McCloys persönliche Vorkriegsförderung oder nur institutionelle Verwicklung?"
    evidence_refs: ["e002"]
    disputed: false
    notes: "Offizielle NARA-Zusammenfassung deklassifizierter Unterlagen; stark für institutionelle Verwicklung und Dollarbeschaffung, nicht hinreichend für McCloys persönliche Kausalität."

  - source_ref: "s003"
    questions:
      - "Ist dies eine akademische Sekundärquelle aus demselben Quellencluster des Nazi War Crimes Disclosure Act?"
      - "Liefert sie unabhängige Analyse zur Rolle von Chase im Rueckwanderer-Mark-System?"
      - "Identifiziert sie McCloy als operativen Förderer des Systems?"
    evidence_refs: ["e009", "e002"]
    disputed: false
    notes: "Als methodentransparente akademische Quelle für den institutionellen Chase/Rueckwanderer-Claim gewichtet. Ihr Cluster überschneidet sich teilweise mit NARA-basierten Unterlagen; sie etabliert daher McCloys persönliche Kausalität nicht unabhängig."

  - source_ref: "s004"
    questions:
      - "Ist die Quelle für McCloys Chronologie nützlich?"
      - "Hat die Institution ein wohlwollendes Interesse an McCloys öffentlichem Vermächtnis?"
      - "Ist die Chronologie relevant für den Claim, McCloy habe Chase-Handeln von 1936 bis 1941 geleitet?"
    evidence_refs: ["e003"]
    disputed: false
    notes: "Als nützliche, aber institutionell interessierte Chronologie-Evidenz gewichtet. Das Datum des Chase-Vorsitzes 1953 ist relevant gegen eine Chase-Vorsitzenden-Version der Behauptung."

  - source_ref: "s005"
    questions:
      - "Ist die Quelle eine knappe unabhängige Referenz für McCloys Kriegs- und Nachkriegsrollen?"
      - "Stützt sie Rollenzuordnung ohne zusätzliche Kausalspekulation?"
      - "Reicht sie allein für detaillierte Archivclaims?"
    evidence_refs: ["e004"]
    disputed: false
    notes: "Als allgemein zuverlässige Referenzquelle für Chronologie und Rollenzuordnung gewichtet, nicht als Primärquelle für umstrittene Kausalität."

  - source_ref: "s006"
    questions:
      - "Ist die Quelle nah an offiziellen Unterlagen zu den Nürnberger Nachfolgeprozessen?"
      - "Stützt sie Existenz und Datum von McCloys Strafmilderungsentscheidungen?"
      - "Belegt sie Motiv oder nur rechtlich-administrative Ergebnisse?"
    evidence_refs: ["e005"]
    disputed: false
    notes: "Offizielle NARA-Übersicht stützt den Kontext der Strafmilderungen vom 31. Januar 1951. Sie stützt Nachkriegshandeln, nicht ein pro-nazistisches Motiv."

  - source_ref: "s007"
    questions:
      - "Hat die Quelle ein institutionelles Interesse am Krupp-Erbe?"
      - "Ist das interessierte Eingeständnis adversariell relevant, wenn es Begnadigungs-/Konfiskationsfakten anerkennt?"
      - "Braucht es Bestätigung durch weniger interessierte Quellen?"
    evidence_refs: ["e010", "e006"]
    disputed: false
    notes: "Mit hohem institutionellen Interessenrisiko gewichtet, weil es sich um eine Krupp-Institutionsquelle handelt. Sie wird nur als bestätigend und adversariell relevant behandelt, wenn sie mit Hansard-/NARA-Kontext kombiniert wird."

  - source_ref: "s008"
    questions:
      - "Ist dies ein formaler öffentlicher Parlamentsbericht?"
      - "Bestätigt er unabhängig die McCloy zugeschriebene Aufhebung der Krupp-Konfiskation?"
      - "Belegt er ein Motiv oder nur rechtlich-politisches Handeln?"
    evidence_refs: ["e006"]
    disputed: false
    notes: "Parlamentsbericht stützt den Fakt der Vermögensrestitution und hilft c005/c006 zu bestätigen. Er belegt kein pro-nazistisches Motiv."

  - source_ref: "s009"
    questions:
      - "Ist das Dokument Primärevidenz für McCloys politische Rahmung als High Commissioner?"
      - "Stützt es den Kontext der Westintegration?"
      - "Stützt es ein Nazi-Sympathie-Motiv?"
    evidence_refs: ["e007"]
    disputed: false
    notes: "Primäres FRUS-/State-Department-Dokument stützt den Westbindungs-/Reintegrationsrahmen. Sein institutionelles Interessenrisiko ist deklariert, weil es zugleich eine US-Policy-Selbstbeschreibung ist."

  - evidence_id: "e002"
    source_ref: "s002"
    claim_refs: ["c001", "c002"]
    type: "secondary_summary"
    summary: "NARA berichtet, dass die NS-Regierung bis zur Vermögenssperre vom 14. Juni 1941 in den USA Dollar-Devisen aufbaute und dass US-Finanzinstitutionen Deutschen von 1936 bis 1941 halfen, mehr als 20 Millionen Dollar zu beschaffen und über 1,2 Millionen Dollar Provisionen verdienten."
    verbatim_or_ref: "Siehe s002: https://www.archives.gov/press/press-releases/2004/nr04-55"
    evidence_excerpt: "Das Media-Alert-Datum ist Thursday, May 13, 2004; NARA sagt, US-Finanzinstitutionen seien klar verwickelt gewesen, hätten Deutschen von 1936 bis 1941 über 20 Millionen Dollar beschaffen helfen und über 1,2 Millionen Dollar Provisionen erhalten."
    locator: "s002 Abschnitt: Media-Alert-Datum; 'Chase National Bank, Jewish Accounts, and Nazi Germany'"
    accessed_at: "2026-05-14"
    supports: ["c002"]
    contradicts: []
    notes: "Stützt institutionelle Finanzhilfe; identifiziert McCloy nicht als Förderer."

  - evidence_id: "e003"
    source_ref: "s004"
    claim_refs: ["c001", "c003"]
    type: "secondary_summary"
    summary: "Die Biografie des American Council on Germany verortet McCloys Chase-Vorsitz im Jahr 1953 und seine Aufsicht über die Chase-Manhattan-Fusion im Jahr 1955."

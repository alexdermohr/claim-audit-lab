    evidence_excerpt: "Die ACG-Chronologie setzt McCloys Vorsitz der Chase National Bank nach seiner Rückkehr aus Deutschland im Jahr 1953 an, nicht während des Rueckwanderer-Systems 1936–1941."
    locator: "s004 biografische Chronologie um 1953 und 1955"
    accessed_at: "2026-05-14"
    supports: ["c003"]
    contradicts: ["c001"]
    notes: "Widerspricht einer Version der Behauptung, die davon abhängt, dass McCloy während des Rueckwanderer-Systems 1936–1941 Chase-Vorsitzender gewesen sei."

  - evidence_id: "e004"
    source_ref: "s005"
    claim_refs: ["c001", "c004"]
    type: "secondary_summary"
    summary: "Britannica fasst McCloys Kriegsrolle als U.S. Assistant Secretary of War und seine spätere Nachkriegsrolle als High Commissioner for Germany zusammen."
